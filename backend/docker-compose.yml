version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: civicos_postgis
    environment:
      POSTGRES_USER: civic_admin
      POSTGRES_PASSWORD: civic_password
      POSTGRES_DB: civicos_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
